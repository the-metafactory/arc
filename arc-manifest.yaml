# arc-manifest.yaml — capability declaration
schema: arc/v1
name: arc
version: 0.21.1
type: tool
tier: core
description: Agentic component package manager — install, manage, and distribute AI agent skills

author:
  name: jcfischer
  github: jcfischer

provides:
  cli:
    - command: "bun src/cli.ts"
      name: "arc"
  skill:
    - name: PackageBuilder
      path: skill/
      trigger: build package
    - name: PackageBuilder
      path: skill/
      trigger: create package
    - name: PackageBuilder
      path: skill/
      trigger: package skill
    - name: PackageBuilder
      path: skill/
      trigger: metafactory package
    - name: PackageBuilder
      path: skill/
      trigger: author-builder

depends_on:
  tools:
    - name: bun
      version: ">=1.0.0"

bundle:
  exclude:
    - vendor
    - MEMORY
    - Plans
    - design
    - rawdata.json
    - "*.md.bak"

capabilities:
  filesystem:
    read:
      - "~/.claude/**"
      - "~/.config/arc/**"
    write:
      - "~/.claude/**"
      - "~/.config/arc/**"
  network:
    - domain: "github.com"
      reason: "Clone package repos during install/upgrade"
    - domain: "api.github.com"
      reason: "Fetch registry metadata and release info"
    - domain: "registry.npmjs.org"
      reason: "Resolve npm-hosted dependencies"
  bash:
    allowed: true
  secrets:
    - GITHUB_TOKEN
