# arc-manifest.yaml — capability declaration
schema: arc/v1
name: arc
version: 0.43.0
type: tool
tier: core
description: Agentic component package manager — install, manage, and distribute AI agent skills
repository: the-metafactory/arc

author:
  name: jcfischer
  github: jcfischer

provides:
  cli:
    - command: "bun src/cli.ts"
      name: "arc"
  # The PackageBuilder skill is no longer provided in-tree by arc. It was
  # extracted to its own repo and is consumed as a dependency instead — see
  # depends_on.packages below (arc#319, WS3, ADR-0024 D2).

depends_on:
  tools:
    - name: bun
      version: ">=1.0.0"
  # metafactory-skill-package-builder (arc#319, WS3, ADR-0024 D2): the canonical
  # PackageBuilder skill (formerly the in-tree skill/ dir, a 985-line SKILL.md +
  # workflows) now lives in its own repo; arc consumes it as a dependency — the same
  # auto-install pattern cortex uses for its surface-plugin bundles (cortex#2028).
  # arc's installer reads depends_on.packages ({name, repo}) to clone + install
  # each dep on `arc install arc` / `arc upgrade arc`; the in-tree copy is deleted
  # in this SAME release, no fallback copy. Version intent >=0.1.0 (the
  # PackageDependency shape carries no version field — arc installs the repo head).
  # Distribution is repo-first (ADR-0017).
  packages:
    - name: "metafactory-skill-package-builder"
      repo: "https://github.com/the-metafactory/metafactory-skill-package-builder"

bundle:
  exclude:
    - vendor
    - MEMORY
    - Plans
    - design
    - rawdata.json
    - "*.md.bak"

capabilities:
  filesystem:
    read:
      - "~/.claude/**"
      - "~/.config/arc/**"
    write:
      - "~/.claude/**"
      - "~/.config/arc/**"
  network:
    - domain: "github.com"
      reason: "Clone package repos during install/upgrade"
    - domain: "api.github.com"
      reason: "Fetch registry metadata and release info"
    - domain: "registry.npmjs.org"
      reason: "Resolve npm-hosted dependencies"
  bash:
    allowed: true
  secrets:
    - GITHUB_TOKEN
