name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Lint — strict ESLint gate (PR #150 sweep: 633 → 0 warnings)
  # ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - run: bun install --frozen-lockfile

      - name: ESLint (errors only — gate)
        run: bun run lint:errors

  # ──────────────────────────────────────────────────────────────────
  # Version consistency — arc-manifest.yaml (release source of truth) and
  # package.json MUST declare the same version. `arc --version` derives from
  # the manifest; this gate keeps the compiled-in package.json fallback honest
  # so the two can never silently drift (the bug this enforces against: manifest
  # 0.33.0 vs package.json 0.30.5). Inline equivalent of compass's shared
  # scripts/check-version-consistency.sh (that script lives in another repo).
  # ──────────────────────────────────────────────────────────────────
  version-consistency:
    name: Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assert arc-manifest.yaml and package.json versions match
        run: |
          manifest_version="$(grep -E '^version:' arc-manifest.yaml | head -1 | sed -E 's/^version:[[:space:]]*//; s/["'\'']//g; s/[[:space:]]*(#.*)?$//')"
          package_version="$(grep -E '"version"' package.json | head -1 | sed -E 's/.*"version"[[:space:]]*:[[:space:]]*"([^"]*)".*/\1/')"
          echo "arc-manifest.yaml: ${manifest_version}"
          echo "package.json:      ${package_version}"
          if [ -z "${manifest_version}" ] || [ -z "${package_version}" ]; then
            echo "::error::Could not read a version from one of the files."
            exit 1
          fi
          if [ "${manifest_version}" != "${package_version}" ]; then
            echo "::error::Version drift — arc-manifest.yaml (${manifest_version}) != package.json (${package_version}). A release bump must update BOTH."
            exit 1
          fi
          echo "OK: versions match (${manifest_version})."

  # ──────────────────────────────────────────────────────────────────
  # Type-check
  # ──────────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - run: bun install --frozen-lockfile

      - name: TypeScript strict check
        run: bunx tsc --noEmit

  # ──────────────────────────────────────────────────────────────────
  # Tests — unit + commands + e2e (all run via `bun test`)
  #
  # Currently advisory (continue-on-error). 25 pre-existing tests fail
  # on Linux runners due to platform deltas: GNU tar's "file changed
  # as we read it" error when the bundle is written into the package
  # dir being tarred (BSD tar tolerates this), and identity-keygen
  # tests timing out at 5s. Tracked in arc#151; flip to gating after
  # the bundle path + keygen are made platform-portable.
  # ──────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - run: bun install --frozen-lockfile

      - name: Run full test suite
        run: bun test

  # ──────────────────────────────────────────────────────────────────
  # systemd e2e — plain Actions jobs have no systemd user bus
  # ("systemctl --user" -> "Failed to connect to bus"), so this job
  # boots one before running the linux-systemd HostAdapter's e2e test.
  # Not in required checks yet; the L2 dispatch issue (arc epic) is
  # what actually populates test/e2e/systemd*.test.ts, so a zero-match
  # glob here is expected and not a failure. Keep this step block
  # byte-similar to cortex's sibling job (design/linux-host-support.md
  # §L2) so the two can be lifted into a shared composite action later.
  # ──────────────────────────────────────────────────────────────────
  systemd-e2e:
    name: systemd e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - run: bun install --frozen-lockfile

      - name: Enable systemd user session
        run: |
          sudo loginctl enable-linger "$(whoami)"
          for i in $(seq 1 15); do
            if [ -S "/run/user/$(id -u)/bus" ]; then
              break
            fi
            sleep 1
          done
          test -S "/run/user/$(id -u)/bus"
          echo "XDG_RUNTIME_DIR=/run/user/$(id -u)" >> "$GITHUB_ENV"
          echo "DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/$(id -u)/bus" >> "$GITHUB_ENV"

      - name: Verify env exported
        run: env | grep -E "XDG_RUNTIME|DBUS"

      - name: Smoke check systemd --user
        run: systemctl --user status --no-pager || systemctl --user list-units --no-pager | head -5

      - name: Run systemd e2e tests (if any exist yet)
        run: |
          if ls test/e2e/systemd*.test.ts >/dev/null 2>&1; then
            bun test test/e2e/systemd*.test.ts
          else
            echo "no systemd e2e tests yet"
          fi
