name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Lint — strict ESLint gate (PR #150 sweep: 633 → 0 warnings)
  # ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.38"

      - run: bun install --frozen-lockfile

      - name: ESLint (errors only — gate)
        run: bun run lint:errors

  # ──────────────────────────────────────────────────────────────────
  # Type-check
  # ──────────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.38"

      - run: bun install --frozen-lockfile

      - name: TypeScript strict check
        run: bunx tsc --noEmit

  # ──────────────────────────────────────────────────────────────────
  # Tests — unit + commands + e2e (all run via `bun test`)
  # ──────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.38"

      - run: bun install --frozen-lockfile

      - name: Run full test suite
        run: bun test
