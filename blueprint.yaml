schema: blueprint/v1
repo: arc

features:
  # Foundation
  - id: A-100
    name: Manifest format (arc-manifest.yaml)
    status: done
    iteration: 1
    depends: []
    description: Parse and validate arc-manifest.yaml with capabilities, provides, and dependency declarations

  - id: A-101
    name: Install pipeline
    status: done
    iteration: 1
    depends: [A-100]
    description: "Git clone → verify → symlink → DB record pipeline for all artifact types"

  - id: A-102
    name: Artifact types (skill, tool, agent, prompt, component)
    status: done
    iteration: 1
    depends: [A-101]
    description: Type-specific installation paths and CLI shim generation for tools

  - id: A-103
    name: Database tracking (packages.db)
    status: done
    iteration: 1
    depends: [A-101]
    description: SQLite WAL-mode DB tracking installs with manifest hash, capabilities, and status

  - id: A-104
    name: Enable/disable/remove lifecycle
    status: done
    iteration: 1
    depends: [A-103]
    description: Preserve repo on disable, full cleanup on remove, status tracking in DB

  - id: A-105
    name: Capability audit
    status: done
    iteration: 1
    depends: [A-100]
    description: Surface total capability footprint with cross-tier warnings and risk display

  # Discovery
  - id: A-200
    name: Multi-source registry
    status: done
    iteration: 2
    depends: [A-101]
    description: "sources.yaml with trust tiers (official/community/custom), remote REGISTRY.yaml fetch and cache"

  - id: A-201
    name: Search and catalog
    status: done
    iteration: 2
    depends: [A-200]
    description: "Search across registries, personal catalog.yaml with two-level discovery model"

  - id: A-202
    name: Typed dependency resolution
    status: done
    iteration: 2
    depends: [A-201]
    description: "Skill-to-skill deps with version constraints, recursive resolution"

  # Upgrade & lifecycle
  - id: A-300
    name: Upgrade with lifecycle hooks
    status: done
    iteration: 3
    depends: [A-103, A-200]
    description: "preinstall/postinstall/preupgrade/postupgrade hooks, version comparison, upgrade --check"

  - id: A-301
    name: Self-update and upgrade-core
    status: done
    iteration: 3
    depends: [A-300]
    description: "arc self-update via git pull, upgrade-core for version symlink management"

  - id: A-302
    name: Package init scaffolding
    status: done
    iteration: 3
    depends: [A-100]
    description: "arc init — scaffold new package repo with manifest templates per artifact type"

  # Planned
  - id: A-400
    name: Runtime enforcement (SecurityValidator)
    status: planned
    iteration: 4
    depends: [A-105]
    description: "Extend SecurityValidator to be skill-scoped, merge capabilities into patterns.yaml on install"

  - id: A-401
    name: metafactory registry source
    status: done
    iteration: 4
    depends: [A-200, meta-factory:F2-200]
    description: "Official metafactory registry as a first-class source in arc — F-1 through F-5 merged (v0.13.0)"

  - id: A-402
    name: Version pinning
    status: done
    iteration: 4
    depends: [A-300]
    description: "arc install MySkill@1.2.0 — pin to specific version during install"

  - id: A-403
    name: Author signing (SkillSeal)
    status: planned
    iteration: 4
    depends: [A-105, meta-factory:F5-500]
    description: "GitHub-based key discovery for package signing, future Sigstore keyless signing"

  # Library support
  - id: A-404
    name: Library manifest support
    status: done
    iteration: 5
    depends: [A-100]
    description: "Parse library-type root manifest with artifacts array, discover per-artifact manifests in subdirectories"

  - id: A-405
    name: Library install command
    status: done
    iteration: 5
    depends: [A-404, A-101]
    description: "arc install library:artifact syntax, install single or all artifacts, per-artifact capability audit and DB tracking"

  - id: A-406
    name: SHA-256 registry verification
    status: done
    iteration: 5
    depends: [A-200]
    description: "Verify sha256 field in registry version metadata against downloaded artifact at install time — implemented in src/lib/registry-install.ts verifyChecksum(), wired in src/cli.ts (non-bypassable)"

  - id: A-407
    name: Action artifact type
    status: done
    iteration: 5
    depends: [A-102]
    description: "type: action for pulse actions — install to ~/.config/metafactory/actions/, list/remove support"

  # Publishing
  - id: A-408
    name: Bundle and publish (Phase 1 bootstrap)
    status: done
    iteration: 5
    depends: [A-404, meta-factory:F2-200]
    description: "arc bundle + arc publish — create tarballs, upload to R2, register versions via bootstrap API. Phase 1 of DD-97 convergence."

  # Remote info & inspection
  - id: A-500
    name: Remote package info
    status: done
    iteration: 6
    depends: [A-200, A-404]
    description: "arc info <name> for uninstalled packages — resolve from registry, clone to cache, show manifest, capabilities, and library artifacts list"

  # Supply chain security (Iteration 6, L5)
  - id: A-501
    name: cosign binary bundling
    status: done
    iteration: 6
    depends: []
    description: "Download cosign binaries (darwin-arm64, darwin-amd64, linux-amd64) in build script and embed in arc tarball — no external dependency (OQ-12 resolved: bundle strategy)"

  - id: A-502
    name: cosign wrapper (internal/cosign.ts)
    status: done
    iteration: 6
    depends: [A-501]
    description: "Thin wrapper that locates the bundled cosign binary for the current platform and shells out to it — used by arc install for signature verification"

  - id: A-503
    name: arc install cosign verification
    status: planned
    iteration: 6
    depends: [A-502, meta-factory:F5-500]
    description: "arc install fetches Sigstore bundle alongside artifact, calls cosign verify-blob --bundle --offline — blocks install on verification failure (DD-11, F-505)"

  - id: A-504
    name: arc install registry signature verification
    status: done
    iteration: 6
    depends: [A-406, meta-factory:F-501]
    description: "arc install fetches /.well-known/metafactory-signing-key from the registry and verifies the Ed25519 registry_signature bound to each version against manifest_canonical — blocks install on verification failure, no --force override. Unsigned/legacy versions emit a warning and proceed (matches meta-factory graceful degradation). Implemented in src/lib/registry-signing.ts + wired in src/cli.ts after SHA-256 check."
