# registry.yaml — Community skill registry
# Maintained via PR + review. pai-pkg fetches this for search/discovery.
# This ships WITH pai-pkg — users get it when they fork/clone the repo.

registry:
  skills:
    # Built-in PAI skills
    - name: Research
      description: Multi-agent research with parallel researchers
      author: danielmiessler
      source: https://github.com/danielmiessler/pai/blob/main/skills/Research/SKILL.md
      type: builtin
      status: shipped

    - name: Thinking
      description: Unified analytical and creative thinking modes
      author: danielmiessler
      source: https://github.com/danielmiessler/pai/blob/main/skills/Thinking/SKILL.md
      type: builtin
      status: shipped

    - name: Council
      description: Multi-agent debate with visible transcripts
      author: danielmiessler
      source: https://github.com/danielmiessler/pai/blob/main/skills/Thinking/Council/SKILL.md
      type: builtin
      status: shipped
      requires: [skill:Thinking]

    - name: RedTeam
      description: Adversarial stress testing and critique
      author: danielmiessler
      source: https://github.com/danielmiessler/pai/blob/main/skills/Thinking/RedTeam/SKILL.md
      type: builtin
      status: shipped
      requires: [skill:Thinking]

    - name: Media
      description: Visual and video content creation
      author: danielmiessler
      source: https://github.com/danielmiessler/pai/blob/main/skills/Media/SKILL.md
      type: builtin
      status: shipped

    - name: Security
      description: Security assessment and intelligence
      author: danielmiessler
      source: https://github.com/danielmiessler/pai/blob/main/skills/Security/SKILL.md
      type: builtin
      status: shipped

    - name: Utilities
      description: Developer utilities, CLI generation, skill scaffolding
      author: danielmiessler
      source: https://github.com/danielmiessler/pai/blob/main/skills/Utilities/SKILL.md
      type: builtin
      status: shipped

    # Community skills
    - name: SpecFlow
      description: Spec-driven development workflow
      author: jcfischer
      source: https://github.com/jcfischer/specflow-bundle/blob/main/skill/SKILL.md
      type: community
      status: shipped
      has_cli: true
      bundle: true
      reviewed_by: [mellanon]

    - name: ContentFilter
      description: Prompt injection detection (34 patterns, 389 tests)
      author: jcfischer
      source: https://github.com/jcfischer/pai-content-filter/blob/main/skill/SKILL.md
      type: system
      status: shipped
      has_cli: true
      reviewed_by: [mellanon, steffen025]

  agents:
    - name: Architect
      description: Elite system design specialist (Serena Blackwood)
      author: danielmiessler
      source: https://github.com/danielmiessler/pai/blob/main/agents/Architect.md
      type: builtin
      status: shipped

    - name: Engineer
      description: Elite principal engineer (Marcus Chen)
      author: danielmiessler
      source: https://github.com/danielmiessler/pai/blob/main/agents/Engineer.md
      type: builtin
      status: shipped

    - name: Pentester
      description: Offensive security specialist (Rook Blackburn)
      author: danielmiessler
      source: https://github.com/danielmiessler/pai/blob/main/agents/Pentester.md
      type: builtin
      status: shipped

    - name: Designer
      description: Elite UX/UI design specialist
      author: danielmiessler
      source: https://github.com/danielmiessler/pai/blob/main/agents/Designer.md
      type: builtin
      status: shipped

  prompts: []
